name: Sync to Hugging Face hub
on:
  push:
    branches: [main] # Change this to master if your default branch is master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://sai0503:$HF_TOKEN@huggingface.co/spaces/sai0503/rag-app main
