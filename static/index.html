<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG App</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f7;
  --surface: #ffffff;
  --border: #e5e4e0;
  --border-strong: #ccc9c2;
  --text: #1a1a18;
  --text-muted: #6b6b67;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --purple-dark: #3C3489;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #A32D2D;
  --red-light: #FCEBEB;
  --radius: 10px;
  --radius-sm: 6px;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; height: 100dvh; display: flex; flex-direction: column; }

/* Layout */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 52px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar-logo { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; }
.topbar-logo svg { color: var(--purple); }
.topbar-badge { font-size: 11px; background: var(--purple-light); color: var(--purple-dark); padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
.status-dot.ok { background: var(--teal); }
.status-text { font-size: 13px; color: var(--text-muted); }

.main { display: flex; flex: 1; min-height: 0; }
.sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; }
.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Sidebar */
.sidebar-section { padding: 1rem; border-bottom: 1px solid var(--border); }
.sidebar-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; }

.upload-zone {
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 1rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg);
  margin-bottom: 8px;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--purple); background: var(--purple-light); }
.upload-zone p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.upload-zone strong { font-size: 14px; color: var(--text); }
#fileInput { display: none; }

.url-row { display: flex; gap: 6px; }
.url-row input { flex: 1; height: 34px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 10px; font-size: 13px; background: var(--bg); color: var(--text); }
.url-row input:focus { outline: none; border-color: var(--purple); }
.btn-sm { height: 34px; padding: 0 12px; font-size: 13px; font-weight: 500; border: none; border-radius: var(--radius-sm); cursor: pointer; background: var(--purple); color: white; white-space: nowrap; }
.btn-sm:hover { background: var(--purple-dark); }
.btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }

.doc-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
.doc-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid transparent; margin-bottom: 4px; }
.doc-item:hover { background: var(--bg); border-color: var(--border); }
.doc-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.doc-icon.pdf { background: var(--red-light); color: var(--red); }
.doc-icon.docx { background: var(--purple-light); color: var(--purple-dark); }
.doc-icon.url { background: var(--teal-light); color: var(--teal); }
.doc-icon.text { background: var(--amber-light); color: var(--amber); }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-meta { font-size: 11px; color: var(--text-muted); }
.doc-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 2px 4px; border-radius: 4px; opacity: 0; flex-shrink: 0; }
.doc-item:hover .doc-del { opacity: 1; }
.doc-del:hover { background: var(--red-light); color: var(--red); }
.doc-empty { padding: 1.5rem; text-align: center; color: var(--text-muted); font-size: 13px; }

/* Chat */
.messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 16px; }
.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--text-muted); }
.empty-state svg { opacity: 0.3; }
.empty-state h2 { font-size: 17px; font-weight: 500; color: var(--text); }
.empty-state p { font-size: 14px; max-width: 300px; text-align: center; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
.suggestion-btn { font-size: 13px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); cursor: pointer; color: var(--text); }
.suggestion-btn:hover { border-color: var(--purple); color: var(--purple); }

.msg { display: flex; flex-direction: column; gap: 4px; max-width: 780px; width: 100%; margin: 0 auto; }
.msg.user { align-items: flex-end; }
.msg.ai { align-items: flex-start; }
.bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.msg.user .bubble { background: var(--purple); color: white; border-bottom-right-radius: 4px; max-width: 70%; }
.msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; width: 100%; }
.msg.ai .bubble.thinking { color: var(--text-muted); font-style: italic; }
.sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.source-chip { font-size: 11px; padding: 3px 10px; border-radius: 999px; background: var(--purple-light); color: var(--purple-dark); border: 1px solid #d0cdf5; cursor: default; }
.score-badge { font-size: 10px; opacity: 0.7; margin-left: 2px; }

.input-bar { border-top: 1px solid var(--border); padding: 1rem 1.5rem; background: var(--surface); }
.input-row { display: flex; gap: 10px; max-width: 780px; margin: 0 auto; }
.input-row textarea { flex: 1; resize: none; min-height: 44px; max-height: 160px; font-size: 14px; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: inherit; color: var(--text); background: var(--bg); line-height: 1.5; }
.input-row textarea:focus { outline: none; border-color: var(--purple); background: var(--surface); }
.send-btn { width: 44px; height: 44px; border-radius: 10px; border: none; background: var(--purple); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: flex-end; }
.send-btn:hover { background: var(--purple-dark); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.progress-overlay { position: fixed; bottom: 80px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); display: none; gap: 8px; align-items: center; z-index: 100; }
.progress-overlay.show { display: flex; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: white; font-size: 13px; padding: 8px 16px; border-radius: 999px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 200; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
    RAG App
  </div>
  <span class="topbar-badge">Python · FastAPI · Claude</span>
  <div class="topbar-right">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Connecting…</span>
  </div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>Upload Documents</h3>
      <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <strong>📎 Drop files or click</strong>
        <p>PDF · DOCX · TXT · MD</p>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt,.md,.markdown,.rst,.csv" multiple />
      <div class="url-row">
        <input type="text" id="urlInput" placeholder="Paste a URL…" />
        <button class="btn-sm" id="urlBtn">Add</button>
      </div>
    </div>

    <div class="sidebar-section" style="padding-bottom: 8px;">
      <h3>Documents (<span id="docCount">0</span>)</h3>
    </div>
    <div class="doc-list" id="docList">
      <div class="doc-empty">No documents yet.<br/>Upload files or add a URL above.</div>
    </div>
  </aside>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <h2>Ask your documents anything</h2>
        <p>Upload PDFs, Word docs, text files, or paste a URL to get started.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="setQ('Summarize the main points')">Summarize the main points</button>
          <button class="suggestion-btn" onclick="setQ('What are the key findings?')">Key findings</button>
          <button class="suggestion-btn" onclick="setQ('List all action items or recommendations')">Action items</button>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <textarea id="questionInput" placeholder="Ask a question about your documents…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="progress-overlay" id="progressOverlay">
  <div class="spinner"></div>
  <span id="progressMsg">Processing…</span>
</div>
<div class="toast" id="toast"></div>

<script>
const BASE = '';  // same origin
let chatHistory = [];
let isBusy = false;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const urlInput = document.getElementById('urlInput');
const urlBtn = document.getElementById('urlBtn');
const docList = document.getElementById('docList');
const docCount = document.getElementById('docCount');
const messages = document.getElementById('messages');
const emptyState = document.getElementById('emptyState');
const questionInput = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const progressOverlay = document.getElementById('progressOverlay');
const progressMsg = document.getElementById('progressMsg');

// ── Health check ──────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${BASE}/api/health`);
    const d = await r.json();
    statusDot.className = 'status-dot ok';
    statusText.textContent = d.anthropic_key_set ? 'Ready' : 'No API key set';
  } catch {
    statusDot.className = 'status-dot';
    statusText.textContent = 'Offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ── Document list ─────────────────────────────────────────────────────────────
async function loadDocs() {
  try {
    const r = await fetch(`${BASE}/api/documents/`);
    const d = await r.json();
    renderDocs(d.documents || []);
  } catch {}
}

function renderDocs(docs) {
  docCount.textContent = docs.length;
  sendBtn.disabled = docs.length === 0;
  if (!docs.length) {
    docList.innerHTML = '<div class="doc-empty">No documents yet.<br/>Upload files or add a URL above.</div>';
    return;
  }
  docList.innerHTML = docs.map(doc => `
    <div class="doc-item" data-id="${doc.id}">
      <div class="doc-icon ${doc.type}">${iconFor(doc.type)}</div>
      <div class="doc-info">
        <div class="doc-name" title="${esc(doc.name)}">${esc(doc.name)}</div>
        <div class="doc-meta">${doc.chunk_count} chunks · ${fmtSize(doc.char_count)}</div>
      </div>
      <button class="doc-del" onclick="deleteDoc('${doc.id}')" title="Remove">✕</button>
    </div>
  `).join('');
}

function iconFor(t) { return { pdf: '📄', docx: '📝', url: '🌐', text: '📃' }[t] || '📄'; }
function fmtSize(c) { return c > 1000 ? `${(c/1000).toFixed(0)}k chars` : `${c} chars`; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function deleteDoc(id) {
  await fetch(`${BASE}/api/documents/${id}`, { method: 'DELETE' });
  toast('Document removed');
  loadDocs();
}
loadDocs();

// ── Upload ────────────────────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); uploadFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => uploadFiles(e.target.files));

async function uploadFiles(files) {
  for (const file of files) {
    setProgress(`Uploading ${file.name}…`);
    const fd = new FormData();
    fd.append('file', file);
    try {
      const r = await fetch(`${BASE}/api/documents/upload`, { method: 'POST', body: fd });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Upload failed');
      toast(`✓ ${d.name} — ${d.chunks} chunks`);
    } catch(e) { toast(`✗ ${e.message}`, true); }
  }
  hideProgress();
  loadDocs();
  fileInput.value = '';
}

urlBtn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  if (!url) return;
  setProgress('Fetching URL…');
  urlBtn.disabled = true;
  try {
    const r = await fetch(`${BASE}/api/documents/url`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Failed');
    toast(`✓ ${d.name} — ${d.chunks} chunks`);
    urlInput.value = '';
  } catch(e) { toast(`✗ ${e.message}`, true); }
  hideProgress();
  urlBtn.disabled = false;
  loadDocs();
});

urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') urlBtn.click(); });

// ── Chat ──────────────────────────────────────────────────────────────────────
questionInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
});
questionInput.addEventListener('input', function() {
  this.style.height = '44px';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});
sendBtn.addEventListener('click', ask);

function setQ(q) { questionInput.value = q; questionInput.focus(); }

async function ask() {
  const q = questionInput.value.trim();
  if (!q || isBusy) return;
  isBusy = true;
  sendBtn.disabled = true;
  questionInput.value = '';
  questionInput.style.height = '44px';

  if (emptyState) emptyState.remove();

  appendMsg('user', q);
  const aiEl = appendMsg('ai', 'Searching documents…', true);
  scrollBottom();

  chatHistory.push({ role: 'user', content: q });

  try {
    const r = await fetch(`${BASE}/api/query/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, top_k: 5, chat_history: chatHistory.slice(-8) }),
    });
    const payload = await r.text();
    let d;
    try {
      d = JSON.parse(payload);
    } catch {
      if (!r.ok) throw new Error(payload || 'Invalid JSON response from server');
      throw new Error('Invalid JSON response from server');
    }
    if (!r.ok) throw new Error(d.detail || d.error || 'Query failed');

    aiEl.querySelector('.bubble').classList.remove('thinking');
    aiEl.querySelector('.bubble').textContent = d.answer;

    chatHistory.push({ role: 'assistant', content: d.answer });

    if (d.sources && d.sources.length) {
      const sourcesEl = document.createElement('div');
      sourcesEl.className = 'sources';
      d.sources.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'source-chip';
        chip.title = s.excerpt;
        chip.textContent = `${s.doc_name}`;
        chip.innerHTML += `<span class="score-badge">${Math.round(s.score * 100)}%</span>`;
        sourcesEl.appendChild(chip);
      });
      aiEl.appendChild(sourcesEl);
    }
  } catch(e) {
    aiEl.querySelector('.bubble').classList.remove('thinking');
    aiEl.querySelector('.bubble').textContent = `Error: ${e.message}`;
  }

  scrollBottom();
  isBusy = false;
  sendBtn.disabled = false;
  questionInput.focus();
}

function appendMsg(role, text, thinking = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (thinking ? ' thinking' : '');
  bubble.textContent = text;
  div.appendChild(bubble);
  messages.appendChild(div);
  return div;
}

function scrollBottom() { messages.scrollTop = messages.scrollHeight; }

// ── Utils ─────────────────────────────────────────────────────────────────────
function setProgress(msg) { progressMsg.textContent = msg; progressOverlay.classList.add('show'); }
function hideProgress() { progressOverlay.classList.remove('show'); }

function toast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#A32D2D' : '#1a1a18';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
